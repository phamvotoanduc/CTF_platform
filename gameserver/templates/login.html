{% extends 'base.html' %}
{% block content %}

<style>
    /* ═══════════════════════════════════════════════
       LOGIN PAGE — Team Authentication
    ═══════════════════════════════════════════════ */

    .login-wrapper {
        min-height: calc(100vh - var(--navbar-height) - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
    }

    .login-panel {
        width: 100%;
        max-width: 440px;
        position: relative;
    }

    /* Corner accent decorations */
    .login-panel::before,
    .login-panel::after {
        content: '';
        position: absolute;
        width: 18px;
        height: 18px;
        border-color: var(--accent);
        border-style: solid;
        z-index: 2;
    }

    .login-panel::before {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
    }

    .login-panel::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
    }

    .login-card {
        background: linear-gradient(145deg, rgba(18,18,20,0.95) 0%, rgba(10,10,12,0.98) 100%);
        border: 1px solid var(--accent-border);
        border-radius: var(--radius-md);
        overflow: hidden;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
            0 0 0 1px rgba(0,0,0,0.5),
            0 8px 32px rgba(0,0,0,0.6),
            0 0 60px rgba(255,230,0,0.04);
        position: relative;
    }

    /* Top LED strip */
    .login-card::before {
        content: '';
        display: block;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
        box-shadow: 0 0 12px var(--accent-glow);
    }

    /* Login header */
    .login-header {
        padding: 2rem 2rem 1.5rem;
        text-align: center;
        border-bottom: 1px solid var(--border-subtle);
    }

    .login-icon {
        display: block;
        font-size: 2.5rem;
        margin-bottom: 0.75rem;
        filter: drop-shadow(0 0 10px rgba(255,230,0,0.4));
    }

    .login-title {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--text-primary);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 0.35rem;
    }

    .login-subtitle {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    /* Login body */
    .login-body {
        padding: 1.75rem 2rem 2rem;
    }

    /* Input labels with terminal style */
    .ctf-label-login {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
    }

    .ctf-label-login .label-prefix {
        color: var(--accent);
        font-size: 0.65rem;
    }

    /* Styled inputs */
    .login-input {
        width: 100%;
        padding: 0.8rem 1rem;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        color: var(--text-primary);
        background: rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: var(--radius-sm);
        outline: none;
        transition: border-color var(--transition-base), box-shadow var(--transition-base), background var(--transition-base);
        -webkit-appearance: none;
    }

    .login-input::placeholder {
        color: rgba(161, 161, 170, 0.4);
        font-size: 0.82rem;
    }

    .login-input:hover:not(:focus) {
        border-color: rgba(255,255,255,0.15);
        background: rgba(0, 0, 0, 0.8);
    }

    .login-input:focus {
        border-color: var(--accent);
        background: rgba(255, 230, 0, 0.03);
        box-shadow:
            0 0 0 3px rgba(255, 230, 0, 0.10),
            0 0 20px rgba(255, 230, 0, 0.06),
            inset 0 0 0 1px rgba(255, 230, 0, 0.05);
    }

    /* Submit button */
    .btn-authenticate {
        width: 100%;
        padding: 0.9rem 1.5rem;
        font-family: var(--font-display);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #000;
        background: var(--accent);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all var(--transition-base);
        margin-top: 0.5rem;
    }

    .btn-authenticate::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
        opacity: 0;
        transition: opacity var(--transition-base);
    }

    .btn-authenticate:hover {
        background: #fff;
        box-shadow:
            0 0 24px var(--accent-glow),
            0 0 48px rgba(255,230,0,0.12);
        transform: translateY(-1px);
    }

    .btn-authenticate:hover::before {
        opacity: 1;
    }

    .btn-authenticate:active {
        transform: translateY(0);
    }

    /* Error alert */
    .login-error {
        display: flex;
        align-items: flex-start;
        gap: 0.6rem;
        padding: 0.75rem 1rem;
        background: var(--danger-dim);
        border: 1px solid rgba(255, 59, 59, 0.3);
        border-radius: var(--radius-sm);
        margin-bottom: 1.25rem;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        color: #ff8080;
        line-height: 1.5;
    }

    .login-error .err-icon {
        flex-shrink: 0;
        font-size: 0.9rem;
    }

    /* Footer note */
    .login-footer {
        padding: 1rem 2rem;
        border-top: 1px solid var(--border-subtle);
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--text-muted);
        letter-spacing: 0.06em;
    }

    /* Form group spacing */
    .login-form-group {
        margin-bottom: 1.25rem;
    }
</style>

<div class="login-wrapper">
    <div class="login-panel">
        <div class="login-card">

            <!-- Header -->
            <div class="login-header">
                <span class="login-icon">🔐</span>
                <h1 class="login-title">Team Authentication</h1>
                <p class="login-subtitle">Cyber Black Market — CTF Platform</p>
            </div>

            <!-- Body -->
            <div class="login-body">

                {% if error %}
                <div class="login-error" role="alert">
                    <span class="err-icon">⚠</span>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <form method="POST" id="login-form" autocomplete="off">

                    <div class="login-form-group">
                        <label for="username" class="ctf-label-login">
                            <span class="label-prefix">//</span>
                            Team Username
                        </label>
                        <input
                            type="text"
                            class="login-input"
                            id="username"
                            name="username"
                            placeholder="e.g. team1"
                            required
                            autocomplete="username"
                            spellcheck="false"
                        >
                    </div>

                    <div class="login-form-group">
                        <label for="password" class="ctf-label-login">
                            <span class="label-prefix">//</span>
                            Team Access Key
                        </label>
                        <input
                            type="password"
                            class="login-input"
                            id="password"
                            name="password"
                            placeholder="team access key"
                            required
                            autocomplete="current-password"
                        >
                    </div>

                    <button type="submit" class="btn-authenticate" id="btn-authenticate">
                        ▶ Authenticate Team
                    </button>

                </form>
            </div>

            <!-- Footer note -->
            <div class="login-footer">
                Credentials pre-allocated in docker configurations
            </div>

        </div>
    </div>
</div>

{% endblock %}
