{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <h3>Team Authentication</h3>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Team Username</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="username" name="username" placeholder="e.g. team1" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Team Access Key</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" placeholder="e.g. teampassword1" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Authenticate Team</button>
                </form>
                <div class="mt-3 text-center small text-muted">
                    Credentials are pre-allocated in docker configurations.
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
