{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Agent Login Authentication</h3>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Authenticate</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="/register" class="text-info text-decoration-none">Create a new agent account</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
