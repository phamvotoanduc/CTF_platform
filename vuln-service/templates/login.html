{% extends 'base.html' %}
{% block content %}
<div style="min-height:65vh;display:flex;align-items:center;justify-content:center;padding:2rem 0;">
    <div style="width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.2rem;margin-bottom:10px;">🔐</div>
            <h1 style="font-size:1.1rem;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px var(--accent-glow);margin-bottom:6px;">Agent Authentication</h1>
            <p class="text-muted font-mono" style="font-size:0.72rem;">Secure identity verification required.</p>
        </div>

        <div class="ctf-card">
            <div class="ctf-card-header"><h3>🕵️ Identity Login</h3></div>
            <div class="ctf-card-body">
                {% if error %}
                <div class="ctf-alert ctf-alert-danger">⛔ {{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="ctf-form-group">
                        <label for="username" class="ctf-label">Username</label>
                        <input type="text" class="ctf-input" id="username" name="username" required placeholder="Enter broker handle...">
                    </div>
                    <div class="ctf-form-group">
                        <label for="password" class="ctf-label">Password</label>
                        <input type="password" class="ctf-input" id="password" name="password" required placeholder="Enter secure password...">
                    </div>
                    <button type="submit" class="btn-ctf-primary" style="padding:0.75rem;">Authenticate →</button>
                </form>
                <hr class="divider">
                <div style="text-align:center;">
                    <span class="text-muted" style="font-size:0.72rem;">New to the exchange? </span>
                    <a href="/register" class="font-mono" style="font-size:0.72rem;">Create broker account →</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
