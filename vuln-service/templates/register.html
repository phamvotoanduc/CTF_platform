{% extends 'base.html' %}
{% block content %}
<div style="min-height:65vh;display:flex;align-items:center;justify-content:center;padding:2rem 0;">
    <div style="width:100%;max-width:420px;">
        <div style="text-align:center;margin-bottom:2rem;">
            <div style="font-size:2.2rem;margin-bottom:10px;">📝</div>
            <h1 style="font-size:1.1rem;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px var(--accent-glow);margin-bottom:6px;">Broker Registration</h1>
            <p class="text-muted font-mono" style="font-size:0.72rem;">Create a new anonymous broker identity.</p>
        </div>

        <div class="ctf-card">
            <div class="ctf-card-header"><h3>📝 Register Identity</h3></div>
            <div class="ctf-card-body">
                {% if error %}
                <div class="ctf-alert ctf-alert-danger">⛔ {{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="ctf-form-group">
                        <label for="username" class="ctf-label">Choose Username</label>
                        <input type="text" class="ctf-input" id="username" name="username" required placeholder="Choose a broker handle...">
                    </div>
                    <div class="ctf-form-group">
                        <label for="password" class="ctf-label">Set Password</label>
                        <input type="password" class="ctf-input" id="password" name="password" required placeholder="Choose a secure password...">
                    </div>
                    <button type="submit" class="btn-ctf-primary" style="padding:0.75rem;">Create Account →</button>
                </form>
                <hr class="divider">
                <div style="text-align:center;">
                    <span class="text-muted" style="font-size:0.72rem;">Already registered? </span>
                    <a href="/login" class="font-mono" style="font-size:0.72rem;">Login here →</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
